<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #F8F9FA;
      --surface: #FFFFFF;
      --primary: #0B57D0;
      --primary-hover: #0842A0;
      --text-main: #1F1F1F;
      --text-secondary: #444746;
      --border-color: #C4C7C5;
      --radius-sm: 8px;
      --radius-md: 24px;
      --radius-pill: 100px;
      --shadow-elevation: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      background-color: var(--surface);
      height: 64px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-elevation);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-main);
    }

    .badge {
      background-color: #E8F0FE;
      color: var(--primary);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
    }

    .app-card {
      background-color: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 900px;
      padding: 40px;
      text-align: center;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .app-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .app-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .upload-zone {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      padding: 60px 20px;
      background-color: #FDFDFD;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .upload-zone:hover {
      border-color: var(--primary);
      background-color: #F4F7FC;
      transform: translateY(-2px);
    }

    .upload-zone.drag-over {
      border-color: var(--primary);
      background-color: #E8F0FE;
      border-width: 2px;
    }

    .upload-icon {
      background-color: #E8F0FE;
      color: var(--primary);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .upload-zone:hover .upload-icon {
      transform: scale(1.1);
      background-color: var(--primary);
      color: white;
    }

    .upload-icon svg {
      width: 32px;
      height: 32px;
      fill: currentColor;
    }

    .upload-text {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 4px;
      color: var(--text-main);
    }

    .upload-hint {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    input[type="file"] {
      display: none;
    }

    .progress-section {
      margin: 32px 0;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.875rem;
    }

    #progress-text {
      color: var(--text-secondary);
      font-weight: 500;
    }

    #progress-percentage {
      color: var(--primary);
      font-weight: 600;
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: #ECECEC;
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #4285F4);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(11, 87, 208, 0.3);
    }

    .results-section {
      margin: 32px 0;
      animation: fadeIn 0.4s ease-out;
    }

    .comparison-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 640px) {
      .comparison-container {
        grid-template-columns: 1fr;
      }
    }

    .image-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .image-wrapper h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .image-wrapper img {
      max-width: 100%;
      max-height: 350px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-elevation);
      display: block;
      object-fit: contain;
    }

    .action-row {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: var(--radius-pill);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 4px rgba(11, 87, 208, 0.2);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 4px 12px rgba(11, 87, 208, 0.3);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background-color: #5F6368;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: var(--radius-pill);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 4px rgba(95, 99, 104, 0.2);
    }

    .btn-secondary:hover {
      background-color: #3C4043;
      box-shadow: 0 4px 12px rgba(95, 99, 104, 0.3);
      transform: translateY(-1px);
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      border-top: 1px solid var(--border-color);
      background-color: var(--surface);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .app-card {
        padding: 24px;
      }

      .app-title {
        font-size: 1.5rem;
      }

      .upload-zone {
        padding: 40px 16px;
      }

      main {
        padding: 16px;
      }

      header {
        padding: 0 16px;
      }
    }

    @media (max-width: 480px) {
      .app-card {
        padding: 16px;
      }

      .app-title {
        font-size: 1.25rem;
      }

      .action-row {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
        justify-content: center;
      }

      .upload-zone {
        padding: 32px 16px;
      }

      .image-wrapper img {
        max-height: 250px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0B57D0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
      </svg>
      Studio Tools
    </div>
    <div class="badge">100% Free</div>
  </header>

  <main id="main-content">
    <div class="app-card">
      <h1 class="app-title">Remove Image Background</h1>
      <p class="app-subtitle">100% automatic and free. Processing runs securely on your device.</p>

      <!-- Upload Zone -->
      <label class="upload-zone" id="upload-zone" for="file-upload">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24">
            <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"></path>
          </svg>
        </div>
        <div class="upload-text">Drag and drop an image, or click to browse</div>
        <div class="upload-hint">Supports high-resolution JPG and PNG</div>
        <input id="file-upload" type="file" accept="image/*">
      </label>

      <!-- Progress Section -->
      <div id="progress-section" class="progress-section" style="display: none;">
        <div class="progress-header">
          <span id="progress-text">Loading image...</span>
          <span id="progress-percentage">0%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <!-- Results Section -->
      <div id="results-section" class="results-section" style="display: none;">
        <div class="comparison-container">
          <div class="image-wrapper">
            <h3>Original</h3>
            <img id="original-image" alt="Original Image">
          </div>
          <div class="image-wrapper">
            <h3>Removed Background</h3>
            <img id="result-image" alt="Result Image">
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-row" id="action-row">
        <button class="btn-primary" id="upload-btn" onclick="document.getElementById('file-upload').click()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Upload Image
        </button>
      </div>

      <!-- Download & Retry Buttons -->
      <div class="action-row" id="download-row" style="display: none;">
        <button class="btn-primary" id="download-btn" onclick="downloadImage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download Image
        </button>
        <button class="btn-secondary" id="retry-btn" onclick="resetUI()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2-8.83"></path>
          </svg>
          Try Another Image
        </button>
      </div>
    </div>
  </main>

  <footer>
    Founded by Rajesh | Yellow sTudios<br>
    <a href="https://instagram.com/notrazx" target="_blank">@notrazx</a>
  </footer>

  <script>
    // ============================================================================
    // AI Background Remover - WORKING VERSION
    // ============================================================================

    let appState = {
      isProcessing: false,
      originalCanvas: null,
      resultCanvas: null
    };

    // Initialize when DOM is ready
    window.addEventListener('load', function() {
      console.log('✅ PAGE LOADED - Setting up event listeners');
      setupEventListeners();
    });

    function setupEventListeners() {
      const fileInput = document.getElementById('file-upload');
      const uploadZone = document.getElementById('upload-zone');

      if (!fileInput) {
        console.error('❌ file-upload element not found');
        return;
      }

      console.log('✅ File input found');

      // File input change event
      fileInput.addEventListener('change', function(e) {
        console.log('📁 FILE SELECTED');
        if (e.target.files[0]) {
          handleFileSelect(e.target.files[0]);
        }
      });

      // Drag and drop
      if (uploadZone) {
        uploadZone.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.stopPropagation();
          uploadZone.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', function() {
          uploadZone.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', function(e) {
          e.preventDefault();
          e.stopPropagation();
          uploadZone.classList.remove('drag-over');
          if (e.dataTransfer.files[0]) {
            console.log('📁 FILE DROPPED');
            handleFileSelect(e.dataTransfer.files[0]);
          }
        });
      }
    }

    async function handleFileSelect(file) {
      console.log('Processing:', file.name, file.size, 'bytes');

      if (!file.type.startsWith('image/')) {
        alert('Please select an image file');
        return;
      }

      await processImage(file);
    }

    async function processImage(file) {
      if (appState.isProcessing) return;

      appState.isProcessing = true;

      try {
        console.log('🚀 Starting processing...');

        // Show progress
        document.getElementById('upload-zone').style.display = 'none';
        document.getElementById('action-row').style.display = 'none';
        document.getElementById('progress-section').style.display = 'block';
        document.getElementById('results-section').style.display = 'none';
        document.getElementById('download-row').style.display = 'none';

        // Load image
        updateProgress(10, 'Loading image...');
        const imageBitmap = await loadImage(file);
        console.log('✅ Image loaded:', imageBitmap.width, 'x', imageBitmap.height);

        // Store original
        updateProgress(20, 'Preparing...');
        appState.originalCanvas = createCanvasFromBitmap(imageBitmap);

        // Remove background
        updateProgress(40, 'Removing background...');
        const resultCanvas = await removeBackground(imageBitmap);
        appState.resultCanvas = resultCanvas;

        // Display
        updateProgress(90, 'Displaying results...');
        displayResults(appState.originalCanvas, resultCanvas);

        updateProgress(100, 'Complete!');
        await sleep(500);

        // Show results
        document.getElementById('progress-section').style.display = 'none';
        document.getElementById('results-section').style.display = 'block';
        document.getElementById('download-row').style.display = 'flex';

        console.log('✅ SUCCESS!');

      } catch (error) {
        console.error('❌ ERROR:', error);
        alert('Error: ' + error.message);
        resetUI();
      } finally {
        appState.isProcessing = false;
      }
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            createImageBitmap(img).then(resolve).catch(reject);
          };
          img.onerror = () => reject(new Error('Failed to load image'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsDataURL(file);
      });
    }

    function createCanvasFromBitmap(imageBitmap) {
      const canvas = document.createElement('canvas');
      canvas.width = imageBitmap.width;
      canvas.height = imageBitmap.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(imageBitmap, 0, 0);
      return canvas;
    }

    async function removeBackground(imageBitmap) {
      const canvas = document.createElement('canvas');
      canvas.width = imageBitmap.width;
      canvas.height = imageBitmap.height;

      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(imageBitmap, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      // Get background color
      const bgColor = getBackgroundColor(data, canvas.width, canvas.height);
      console.log('Background color:', bgColor);

      const threshold = 40;

      // Remove background
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        const dist = Math.sqrt(
          (r - bgColor.r) ** 2 +
          (g - bgColor.g) ** 2 +
          (b - bgColor.b) ** 2
        );

        if (dist < threshold) {
          data[i + 3] = Math.max(0, 255 - (dist / threshold) * 255);
        } else {
          data[i + 3] = 255;
        }
      }

      // Smooth
      smoothAlphaChannel(data, canvas.width, canvas.height);

      ctx.putImageData(imageData, 0, 0);
      return canvas;
    }

    function getBackgroundColor(data, width, height) {
      const samples = [];
      const step = 10;

      for (let x = 0; x < width; x += step) {
        const idx = x * 4;
        samples.push({ r: data[idx], g: data[idx + 1], b: data[idx + 2] });
      }

      for (let x = 0; x < width; x += step) {
        const idx = ((height - 1) * width + x) * 4;
        samples.push({ r: data[idx], g: data[idx + 1], b: data[idx + 2] });
      }

      let r = 0, g = 0, b = 0;
      samples.forEach(s => {
        r += s.r;
        g += s.g;
        b += s.b;
      });

      return {
        r: Math.round(r / samples.length),
        g: Math.round(g / samples.length),
        b: Math.round(b / samples.length)
      };
    }

    function smoothAlphaChannel(data, width, height) {
      const alpha = new Uint8Array(width * height);

      for (let i = 0; i < data.length; i += 4) {
        alpha[i / 4] = data[i + 3];
      }

      const temp = new Uint8Array(alpha.length);
      for (let i = 0; i < alpha.length; i++) {
        const y = Math.floor(i / width);
        const x = i % width;
        let sum = 0, count = 0;

        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            const ny = y + dy;
            const nx = x + dx;
            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
              sum += alpha[ny * width + nx];
              count++;
            }
          }
        }
        temp[i] = Math.round(sum / count);
      }

      for (let i = 0; i < alpha.length; i++) {
        data[i * 4 + 3] = temp[i];
      }
    }

    function updateProgress(pct, text) {
      const bar = document.getElementById('progress-bar');
      const txt = document.getElementById('progress-text');
      const pctEl = document.getElementById('progress-percentage');

      if (bar) bar.style.width = pct + '%';
      if (txt) txt.textContent = text;
      if (pctEl) pctEl.textContent = pct + '%';

      console.log(`⏳ ${pct}% - ${text}`);
    }

    function displayResults(originalCanvas, resultCanvas) {
      const origImg = document.getElementById('original-image');
      const resImg = document.getElementById('result-image');

      if (origImg) origImg.src = originalCanvas.toDataURL('image/png');
      if (resImg) resImg.src = resultCanvas.toDataURL('image/png');
    }

    function resetUI() {
      console.log('🔄 Resetting');
      document.getElementById('upload-zone').style.display = 'flex';
      document.getElementById('action-row').style.display = 'flex';
      document.getElementById('progress-section').style.display = 'none';
      document.getElementById('results-section').style.display = 'none';
      document.getElementById('download-row').style.display = 'none';
      document.getElementById('file-upload').value = '';
    }

    function downloadImage() {
      if (!appState.resultCanvas) {
        alert('No image to download');
        return;
      }

      const link = document.createElement('a');
      link.href = appState.resultCanvas.toDataURL('image/png');
      link.download = 'background-removed.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      console.log('📥 Downloaded');
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    window.downloadImage = downloadImage;
    window.resetUI = resetUI;

    console.log('✅ Script loaded');
  </script>

</body>
</html>
