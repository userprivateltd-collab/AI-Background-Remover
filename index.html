<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Background Remover</h1>
            <p>Upload an image to magically remove the background.</p>
        </header>

        <section class="upload-section">
            <input type="file" id="imageInput" accept="image/png, image/jpeg">
            <label for="imageInput" class="upload-btn">Choose Image</label>
            <p id="fileName">No file chosen</p>
        </section>

        <section class="action-section">
            <button id="removeBgBtn" disabled>Remove Background</button>
            <p id="statusMessage"></p>
        </section>

        <section class="result-section">
            <div class="image-container">
                <img id="originalImage" style="display: none;" alt="Original">
                <img id="resultImage" style="display: none;" alt="Result">
            </div>
            <a id="downloadBtn" class="download-btn" style="display: none;" download="no-bg.png">Download Result</a>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
